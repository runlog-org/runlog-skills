name: release

# Tag-based release workflow for the runlog-skills content repo.
#
# This is a content/docs repo: SKILL.md bodies for the 9 vendor adapters
# plus the JSON plugin manifests `npx @runlog/install` consumes. There
# are no compiled artefacts, so a "release" here is just a tag downstream
# consumers can pin to, paired with the source archive GitHub auto-
# attaches. The workflow's job is narrow — re-run the same gates ci.yml
# applies on push/PR (markdown-lint + dead-link-check) on the tag commit,
# then create the Release with auto-generated notes.
#
# A maintainer cuts a release by pushing `skills/vX.Y.Z`. The
# `skills/` path scope keeps the train discipline explicit even though
# this repo doesn't currently share tags with anything else.
# `workflow_dispatch` is wired up too as a manual smoke-run path that
# exercises the pre-flight without creating a Release (the `release`
# job's `if:` guard skips the gh-release step when the trigger isn't a
# tag push).

on:
  push:
    tags: ["skills/v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Action versions: first-party (actions/*) and the markdownlint-cli2 +
# lychee actions are major-tag pinned to match ci.yml's level of
# pinning — tightening to commit SHAs is a separate sweep across both
# workflows. softprops/action-gh-release and actions/checkout are
# pinned to full commit SHAs (matching the runlog-vocabularies release
# template) so a compromised tag on the release-publishing action
# can't ship malicious release logic. Update by bumping the SHA and
# the trailing comment together.
#
#   actions/checkout@v6              -> de0fac2e4500dabe0009e67214ff5f5447ce83dd
#   softprops/action-gh-release@v3   -> b4309332981a82ec1c5618f44dd2e27cc8bfbfda

jobs:
  markdown-lint:
    # Mirrors ci.yml's markdown-lint job verbatim — same exclusion globs,
    # same action — so the gate that protects main also protects the tag
    # commit. See ci.yml for the rationale on why prose-style rules are
    # off and why skills/ is excluded.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !skills/**

  dead-link-check:
    # Mirrors ci.yml's dead-link-check job verbatim — same lychee args,
    # same allowlist (.lycheeignore), same skills/ exclusion. See ci.yml
    # for the rationale.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --verbose
            --exclude-path skills
            --exclude-path node_modules
            './**/*.md'
          fail: true

  release:
    needs: [markdown-lint, dead-link-check]
    # Only create the Release on an actual tag push. A workflow_dispatch
    # run gets the pre-flight checks above but stops short of publishing —
    # useful for verifying the workflow itself is healthy without burning
    # a version number.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required for softprops/action-gh-release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          # Full history so generate_release_notes can compute the
          # commit/PR delta from the previous tag.
          fetch-depth: 0

      - name: Resolve prerelease flag
        id: meta
        run: |
          ref="${GITHUB_REF##*/}"
          # Tags like skills/v0.1.0-rc1, skills/v0.1.0-beta2,
          # skills/v0.1.0-alpha1 publish as prereleases (visible but
          # flagged); plain semver tags publish as full releases. Same
          # partition runlog-vocabularies uses — content consumers
          # benefit from seeing the tag exist (so they can pin to it
          # for testing) without it being treated as the latest.
          case "$ref" in
            *-rc*|*-beta*|*-alpha*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)                      echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3
        with:
          # `name` defaults to the tag, `tag_name` defaults to the pushed
          # ref — both implicit. No `files:` block: the source archive
          # GitHub auto-attaches is the only artefact for a content repo
          # (markdown bodies + JSON plugin manifests, nothing built).
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
